name: Publish @elixpo/lixsketch to NPM

on:
  push:
    branches:
      - main
    paths:
      - 'packages/lixsketch/**'
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump kind (patch / minor / major). Default: patch"
        required: false
        default: 'patch'

# elixpoo CI agent needs:
#  - contents: write   → push the version-bump commit back to main
#  - packages: write   → publish to GitHub Packages
permissions:
  contents: write
  packages: write

jobs:
  publish:
    name: Publish to NPM + GitHub Packages
    runs-on: ubuntu-latest
    # Skip when the triggering commit is the bot's own bump (loop guard).
    if: |
      github.event_name == 'workflow_dispatch' ||
      !contains(github.event.head_commit.message, 'chore(release): bump @elixpo/lixsketch')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CI_AGENT_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Configure git as elixpoo bot
        run: |
          git config --global user.name "elixpoo"
          git config --global user.email "269200728+elixpoo@users.noreply.github.com"

      - name: Compute next version
        id: version
        working-directory: packages/lixsketch
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          # `npm view` can timeout / rate-limit and return "0.0.0" via the
          # fallback below, which then makes the LOCAL == REMOTE check
          # fail and skips the bump — even though the local version IS
          # already on npm. Treat any non-semver REMOTE as unknown and
          # fall back to "is LOCAL already published?" as the truth source.
          REMOTE=$(npm view @elixpo/lixsketch version 2>/dev/null || echo "unknown")
          BUMP="${{ github.event.inputs.bump || 'patch' }}"

          echo "Local  version: $LOCAL"
          echo "Remote version: $REMOTE"
          echo "Bump kind: $BUMP"

          # Decide whether we need to bump. Three cases:
          #   1. Versions match exactly                  → bump
          #   2. LOCAL already exists in the npm registry → bump (publish would 409)
          #   3. LOCAL is strictly ahead of REMOTE        → respect manual bump, use LOCAL
          NEEDS_BUMP=false
          if [ "$LOCAL" = "$REMOTE" ]; then
            NEEDS_BUMP=true
          elif [ "$REMOTE" = "unknown" ]; then
            # `npm view` failed. Probe `npm view @scope/pkg@LOCAL` directly
            # — if that returns the version string, LOCAL is already on
            # npm and we must bump or the publish below 409's.
            if npm view "@elixpo/lixsketch@${LOCAL}" version >/dev/null 2>&1; then
              echo "LOCAL ($LOCAL) already exists on npm — bumping."
              NEEDS_BUMP=true
            fi
          fi

          if [ "$NEEDS_BUMP" = "true" ]; then
            # `npm version` in a workspace prints "<pkg-name>\nv<x.y.z>" —
            # capturing that into a shell var produces a multi-line value
            # which corrupts $GITHUB_OUTPUT. Bump silently and read the
            # new version back from package.json instead.
            npm version "$BUMP" --no-git-tag-version > /dev/null
            NEW=$(node -p "require('./package.json').version")
            echo "Bumped to $NEW"
            echo "version=$NEW" >> "$GITHUB_OUTPUT"
            echo "auto_bumped=true" >> "$GITHUB_OUTPUT"
          else
            echo "Local ($LOCAL) ahead of remote ($REMOTE) — using local as-is."
            echo "version=$LOCAL" >> "$GITHUB_OUTPUT"
            echo "auto_bumped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to NPM
        # `actions/setup-node@v4` above wires `.npmrc` to use
        # ${NODE_AUTH_TOKEN}. The previous inline
        # `--//registry.npmjs.org/:_authToken=...` flag was producing
        # spurious E404 "Not Found - PUT" (= npm's auth-failed response)
        # on blogs.elixpo — switching to the env-var pattern fixed it
        # there, applying the same fix here pre-emptively.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_LIXSKETCH_PUBLISH_TOKEN }}
        run: npm publish --access public
        working-directory: packages/lixsketch

      # ── Mirror to GitHub Packages ───────────────────────────────────
      - name: Reconfigure Node for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://npm.pkg.github.com'
          scope: '@elixpo'

      - name: Publish to GitHub Packages
        # Non-blocking — see blogs.elixpo/publish-npm.yml for the full
        # explanation; npmjs is the canonical registry, this mirror is
        # best-effort until org packages permissions are configured.
        continue-on-error: true
        working-directory: packages/lixsketch
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ORIGINAL_REPO=$(node -p "JSON.stringify(require('./package.json').repository || null)")
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            pkg.repository = { type: 'git', url: 'git+https://github.com/${{ github.repository }}.git' };
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          if npm publish --access public --registry https://npm.pkg.github.com; then
            echo "::notice::Published to GitHub Packages."
          else
            echo "::warning::GitHub Packages publish failed (likely permission_denied: write_package). The npmjs publish above is canonical; this mirror is best-effort."
          fi
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            const orig = $ORIGINAL_REPO;
            if (orig) pkg.repository = orig; else delete pkg.repository;
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      # ── Commit the auto-bumped version back to main ─────────────────
      - name: Commit and push version bump
        if: steps.version.outputs.auto_bumped == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git add packages/lixsketch/package.json packages/lixsketch/package-lock.json 2>/dev/null || \
            git add packages/lixsketch/package.json
          git commit -m "chore(release): bump @elixpo/lixsketch to v${VERSION}

          Auto-bumped by the publish workflow after a change under
          packages/lixsketch/** was merged without a manual version bump.

          [skip ci]"
          git push origin HEAD:main

      - name: Tag the release
        if: steps.version.outputs.auto_bumped == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag -a "lixsketch-v${VERSION}" -m "lixsketch v${VERSION}"
          git push origin "lixsketch-v${VERSION}"

      - name: Summary
        run: |
          echo "### Published @elixpo/lixsketch@${{ steps.version.outputs.version }} 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- npm: https://www.npmjs.com/package/@elixpo/lixsketch/v/${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub Packages: https://github.com/${{ github.repository }}/pkgs/npm/lixsketch" >> $GITHUB_STEP_SUMMARY
          echo "- Auto-bumped: \`${{ steps.version.outputs.auto_bumped }}\`" >> $GITHUB_STEP_SUMMARY
